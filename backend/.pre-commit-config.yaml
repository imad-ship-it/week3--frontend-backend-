# Pre-commit hooks for taskmanager
# This is the Python equivalent of Husky + lint-staged
# Runs automatically on every "git commit"

repos:
  # Ruff - linting (like ESLint --fix)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.0
    hooks:
      - id: ruff
        args: [--fix]  # Auto-fix issues (like eslint --fix)

      # Ruff - formatting (like Prettier --write)
      - id: ruff-format

  # General file fixes
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace    # Remove trailing whitespace
      - id: end-of-file-fixer      # Ensure files end with newline
      - id: check-yaml             # Validate YAML files
      - id: check-added-large-files # Prevent large files from being committed
